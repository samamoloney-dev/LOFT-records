databases:
  - name: loft-records-db
    plan: free
    postgresMajorVersion: "16"

services:
  - type: web
    name: loft-records-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm run seed && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: loft-records-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production

  - type: web
    name: loft-records-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
